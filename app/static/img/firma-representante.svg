  <circle cx="60" cy="52" r="1.8" fill="#0d0d1a"/>
  <!-- G de García - bucle superior -->
  <path d="M76,42 C72,18 90,10 102,20 C114,30 110,50 96,52 C82,54 74,42 78,32 C80,24 92,24 100,32"
        stroke="#0d0d1a" stroke-width="2.3" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Segundo inicial G de Guevara -->
  <path d="M118,42 C114,20 130,12 142,22 C154,32 150,50 136,52 C122,54 115,43 119,33 C121,25 132,25 140,33"
        stroke="#0d0d1a" stroke-width="2.3" fill="none"
