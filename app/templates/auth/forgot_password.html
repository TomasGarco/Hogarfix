{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="hf-card rounded-4 p-4 p-lg-5" data-aos="fade-up">
      <span class="hf-convert-chip mb-3"><i class="bi bi-shield-lock"></i> Recuperacion segura</span>
      <h1 class="h4 mb-2">Recuperar contrasena</h1>
      <p class="small text-secondary">Ingresa tu correo y te enviaremos un enlace temporal para recuperar tu cuenta.</p>

      <form method="post" class="d-grid gap-3 mt-3" id="forgotForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="email" name="email" id="forgotEmail" class="form-control" required>
        </div>
        <div id="forgotTimerPanel" class="d-none">
          <p class="hf-otp-timer" id="forgotTimerText"></p>
        </div>
        <div class="d-flex justify-content-end">
          <button class="btn hf-btn-primary" id="forgotSubmitBtn">Enviar enlace</button>
        </div>
        <div class="hf-auth-actions">
          <div class="hf-auth-link-stack">
            <a class="hf-auth-link-pill hf-auth-link-pill-login" href="{{ url_for('auth.login') }}">
              <i class="bi bi-box-arrow-in-right"></i> Volver a login
            </a>
            <a class="hf-auth-link-pill hf-auth-link-pill-admin" href="{{ url_for('auth.admin_access') }}">
              <i class="bi bi-shield-lock"></i> Ingresar como admin
            </a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('forgotForm');
  const btn = document.getElementById('forgotSubmitBtn');
  const timerPanel = document.getElementById('forgotTimerPanel');
  const timerText = document.getElementById('forgotTimerText');
  const COOLDOWN = 60; // segundos
  let intervalId = null;

  const STORAGE_KEY = 'hf_forgot_sent_at';

  function formatTime(s) {
    return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }

  function startCooldown(secondsLeft) {
    btn.disabled = true;
    timerPanel.classList.remove('d-none');
    timerText.className = 'hf-otp-timer';
    timerText.textContent = 'Puedes reenviar en: ' + formatTime(secondsLeft);

    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(function () {
      secondsLeft -= 1;
      if (secondsLeft <= 0) {
        clearInterval(intervalId);
        btn.disabled = false;
        timerText.className = 'hf-otp-timer is-expired';
        timerText.textContent = 'Ya puedes enviar el enlace de nuevo.';
        localStorage.removeItem(STORAGE_KEY);
      } else {
        timerText.textContent = 'Puedes reenviar en: ' + formatTime(secondsLeft);
      }
    }, 1000);
  }

  // Restaura el contador si la pagina se recarga dentro del cooldown
  const sentAt = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
  if (sentAt) {
    const elapsed = Math.floor((Date.now() - sentAt) / 1000);
    const remaining = COOLDOWN - elapsed;
    if (remaining > 0) {
      startCooldown(remaining);
    } else {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  if (form) {
    form.addEventListener('submit', function () {
      localStorage.setItem(STORAGE_KEY, Date.now().toString());
    });
  }
});
</script>
{% endblock %}
