{% extends 'base.html' %}
{% block content %}
<section class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height:60vh;">
  <p class="display-1 fw-bold text-secondary mb-0" style="opacity:.15;font-size:8rem;line-height:1;">500</p>
  <h1 class="h3 mt-n3 mb-3">Error interno del servidor</h1>
  <p class="text-secondary mb-4" style="max-width:400px;">
    Algo salió mal en nuestro lado. Ya fuimos notificados. Intenta de nuevo en unos minutos.
  </p>
  <div class="d-flex gap-3">
    <a href="{{ url_for('main.home') }}" class="btn hf-btn-primary">Ir al inicio</a>
    <button onclick="location.reload()" class="btn hf-btn-outline">Reintentar</button>
  </div>
</section>
{% endblock %}
