{% extends 'base.html' %}
{% block content %}
<section class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height:60vh;">
  <p class="display-1 fw-bold text-secondary mb-0" style="opacity:.15;font-size:8rem;line-height:1;">404</p>
  <h1 class="h3 mt-n3 mb-3">Página no encontrada</h1>
  <p class="text-secondary mb-4" style="max-width:400px;">
    La página que buscas no existe o fue movida. Verifica la dirección o regresa al inicio.
  </p>
  <div class="d-flex gap-3">
    <a href="{{ url_for('main.home') }}" class="btn hf-btn-primary">Ir al inicio</a>
    <button onclick="history.back()" class="btn hf-btn-outline">Volver atrás</button>
  </div>
</section>
{% endblock %}
