{% extends 'base.html' %}
{% block content %}
<section class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height:60vh;">
  <p class="display-1 fw-bold text-secondary mb-0" style="opacity:.15;font-size:8rem;line-height:1;">503</p>
  <h1 class="h3 mt-n3 mb-3">Servicio no disponible</h1>
  <p class="text-secondary mb-4" style="max-width:400px;">

</section>
